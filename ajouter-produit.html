<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Produit - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Css/style.css">
    <style>
        /* La magie CSS pour cacher les flèches haut/bas des champs prix et stock */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield; /* Pour Firefox */
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container-fluid px-4 px-lg-5 mt-2 mb-2">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-icon me-2"><i class="fas fa-stethoscope"></i></div>
                <span class="text-dark fw-bold">MediConnect CI</span>
            </a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav menu" id="dynamic-nav-menu"></ul>
                <div class="btn-nav ms-auto gap-2 d-flex" id="dynamic-nav-buttons"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px; max-width: 600px;">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-primary text-white p-4 rounded-top-4">
                <h4 class="mb-0"><i class="fas fa-box-open me-2"></i>Ajouter un nouveau produit</h4>
            </div>
            <div class="card-body p-4">
                <form id="addProductForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom du produit</label>
                        <input type="text" class="form-control" id="nom-produit" placeholder="Ex: Tensiomètre électronique bras" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description courte</label>
                        <textarea class="form-control" id="desc-produit" rows="3" placeholder="Caractéristiques du produit..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prix (FCFA)</label>
                            <input type="number" class="form-control" id="prix-produit" placeholder="Ex: 25000" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Stock disponible</label>
                            <input type="number" class="form-control" id="stock-produit" placeholder="Ex: 50" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Image du produit</label>
                        <input type="file" class="form-control" id="image-produit" accept="image/*" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="submitBtn">
                        <i class="fas fa-plus-circle me-2"></i>Publier le produit
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="navbar.js"></script>
    <script src="ajouter-produit.js"></script>
</body>
</html>
