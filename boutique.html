<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Médicale - MedecineEnLigne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-header {
            background: var(--gradient-primary);
            padding: 120px 0 60px 0;
            color: white;
            text-align: center;
        }
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .product-img {
            height: 200px;
            object-fit: contain;
            width: 100%;
            padding: 20px;
            background: #f8f9fa;
        }
        .price-badge {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-dark);
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container-fluid px-4 px-lg-5 mt-2 mb-2">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-icon me-2">
                    <i class="fas fa-stethoscope"></i>
                </div>
                <span class="text-dark fw-bold">MedecineEnLigne</span>
            </a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav menu" id="dynamic-nav-menu"></ul>
                <div class="btn-nav ms-auto gap-2 d-flex" id="dynamic-nav-buttons"></div>
            </div>
        </div>
    </nav>

    <header class="shop-header">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Matériel Médical</h1>
            <p class="lead mb-0">Équipez-vous avec du matériel professionnel certifié, livré chez vous.</p>
        </div>
    </header>

    <section class="py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark">Nos produits</h2>
                <div id="cart-summary" class="bg-white px-3 py-2 rounded-pill shadow-sm border text-primary-dark fw-bold" style="cursor: pointer;" onclick="window.location.href='panier.html'">
                    <i class="fas fa-shopping-cart me-2"></i> Panier (0)
                </div>
            </div>

            <div class="row g-4" id="products-grid">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Chargement de la boutique...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="navbar.js"></script>
    <script src="boutique.js"></script>
</body>
</html>
