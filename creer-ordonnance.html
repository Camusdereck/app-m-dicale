<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle Ordonnance - MediConnect CI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5 max-w-700">
        <div class="mb-4">
            <a href="./dashboard-medecin.html" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
            </a>
        </div>
        
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-primary text-white p-4 rounded-top-4">
                <h2 class="mb-0"><i class="fas fa-file-medical me-2"></i>Rédiger une Consultation</h2>
                <p class="mb-0 mt-2 text-white-50" id="patient-info">Chargement des informations du patient...</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form id="prescriptionForm">
                    
                    <h5 class="text-primary mt-2 mb-3"><i class="fas fa-heartbeat me-2"></i>Constantes du jour</h5>
                    <div class="row mb-4 bg-white p-3 border rounded">
                        <div class="col-md-4 mb-3 mb-md-0">
                            <label for="poids-input" class="form-label fw-bold text-muted small">Poids (kg)</label>
                            <input type="number" step="0.1" class="form-control form-control-sm" id="poids-input" placeholder="Ex: 70">
                        </div>
                        <div class="col-md-4 mb-3 mb-md-0">
                            <label for="taille-input" class="form-label fw-bold text-muted small">Taille (cm)</label>
                            <input type="number" class="form-control form-control-sm" id="taille-input" placeholder="Ex: 175">
                        </div>
                        <div class="col-md-4">
                            <label for="tension-input" class="form-label fw-bold text-muted small">Tension (mmHg)</label>
                            <input type="text" class="form-control form-control-sm" id="tension-input" placeholder="Ex: 12/8">
                        </div>
                    </div>

                    <div class="mb-4 mt-4">
                        <label for="diagnostic-content" class="form-label fw-bold text-primary-dark">Diagnostic médical</label>
                        <textarea class="form-control" id="diagnostic-content" rows="3" placeholder="Saisissez le diagnostic ou les observations..." required></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="prescription-content" class="form-label fw-bold text-primary-dark">Prescription (Ordonnance)</label>
                        <textarea class="form-control" id="prescription-content" rows="6" placeholder="Ex: Paracétamol 1g, 3 fois par jour..." required></textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="notes-content" class="form-label fw-bold text-muted">Notes privées (Invisibles pour le patient)</label>
                        <textarea class="form-control bg-light" id="notes-content" rows="2" placeholder="Notes personnelles..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-3 fw-bold" id="submitBtn">
                        <i class="fas fa-save me-2"></i>Enregistrer la consultation
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./creer-ordonnance.js"></script>
</body>
</html>
