<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dossier Médical - MedecineEnLigne
</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <a href="./dashboard.html">&larr; Retour au tableau de bord</a>
        <h1 class="mt-3">Mon Dossier Médical</h1>
        <p>Gardez vos informations de santé à jour.</p>
        
        <form id="medicalRecordForm" class="mt-4 card p-4">
            <h5 class="card-title mb-4">Informations vitales</h5>
            
            <div class="mb-3">
                <label for="poids-input" class="form-label">Poids (en kg)</label>
                <input type="number" class="form-control" id="poids-input" placeholder="Ex: 70">
            </div>
            
            <div class="mb-3">
                <label for="taille-input" class="form-label">Taille (en cm)</label>
                <input type="number" class="form-control" id="taille-input" placeholder="Ex: 175">
            </div>

            <div class="mb-3">
                <label for="tension-input" class="form-label">Tension artérielle</label>
                <input type="text" class="form-control" id="tension-input" placeholder="Ex: 12/8">
            </div>

            <hr class="my-4">

            <h5 class="card-title mb-4">Antécédents et allergies</h5>
            <div class="mb-3">
                <label for="antecedents-input" class="form-label">Antécédents médicaux, allergies, etc.</label>
                <textarea class="form-control" id="antecedents-input" rows="5" placeholder="Listez ici vos conditions médicales connues, allergies, traitements en cours..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary mt-3">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./dossier-medical.js"></script> </body>
</html>
