<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Patient - MediConnect CI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5 max-w-700">
        <a href="./dashboard-medecin.html" class="text-decoration-none text-muted">
            <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
        </a>
        
        <div class="d-flex align-items-center mt-4 mb-4">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 60px; height: 60px; font-size: 24px;">
                <i class="fas fa-user"></i>
            </div>
            <div>
                <h2 class="mb-0 text-primary-dark" id="patient-name-title">Chargement du dossier...</h2>
                <span class="badge bg-secondary" id="patient-id-badge">ID: ...</span>
            </div>
        </div>
        
        <form id="medicalRecordForm" class="card shadow-sm border-0 rounded-4 p-4 mb-4">
            <h4 class="card-title text-primary border-bottom pb-2 mb-4"><i class="fas fa-heartbeat me-2"></i>Constantes & Antécédents</h4>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="poids-input" class="form-label fw-bold">Poids (kg)</label>
                    <input type="number" step="0.1" class="form-control" id="poids-input" placeholder="Ex: 70">
                </div>
                
                <div class="col-md-4 mb-3">
                    <label for="taille-input" class="form-label fw-bold">Taille (cm)</label>
                    <input type="number" class="form-control" id="taille-input" placeholder="Ex: 175">
                </div>

                <div class="col-md-4 mb-3">
                    <label for="tension-input" class="form-label fw-bold">Tension (mmHg)</label>
                    <input type="text" class="form-control" id="tension-input" placeholder="Ex: 12/8">
                </div>
            </div>

            <div class="mb-3 mt-3">
                <label for="antecedents-input" class="form-label fw-bold">Antécédents médicaux & allergies</label>
                <textarea class="form-control bg-light" id="antecedents-input" rows="4" placeholder="Listez ici les conditions médicales connues, allergies, traitements en cours..."></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary mt-2" id="saveRecordBtn">
                <i class="fas fa-save me-2"></i>Mettre à jour le dossier
            </button>
        </form>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-5">
            <h4 class="card-title text-primary border-bottom pb-2 mb-4"><i class="fas fa-history me-2"></i>Historique des consultations</h4>
            <div id="consultations-history">
                <p class="text-muted text-center py-3">Chargement de l'historique...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./dossier-patient-medecin.js"></script> 
</body>
</html>
