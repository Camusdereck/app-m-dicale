<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Factures - MedecineEnLigne
</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5 max-w-700">
        <div class="mb-4">
            <a href="./dashboard-medecin.html" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
            </a>
        </div>

        <h2 class="text-primary-dark mb-4"><i class="fas fa-file-invoice-dollar me-2"></i>Facturation des patients</h2>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-5 border-start border-primary border-4">
            <h4 class="card-title text-primary mb-4">Créer une nouvelle facture</h4>
            <form id="invoiceForm">
                <div class="mb-3">
                    <label for="patient-select" class="form-label fw-bold">Choisir le patient</label>
                    <select class="form-select" id="patient-select" required>
                        <option value="" disabled selected>Chargement des patients...</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="description-input" class="form-label fw-bold">Détails de la prestation</label>
                    <input type="text" class="form-control" id="description-input" placeholder="Ex: Consultation vidéo, Suivi pédiatrique, Renouvellement..." required>
                </div>
                
                <div class="mb-4">
                    <label for="amount-input" class="form-label fw-bold">Montant de la consultation (FCFA)</label>
                    <input type="number" class="form-control form-control-lg text-primary fw-bold" id="amount-input" placeholder="Ex: 5000" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="sendInvoiceBtn">
                    <i class="fas fa-paper-plane me-2"></i>Envoyer la facture au patient
                </button>
            </form>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-4">
            <h4 class="card-title text-dark mb-4"><i class="fas fa-list me-2"></i>Historique des factures envoyées</h4>
            <div id="doctor-invoices-list">
                <p class="text-muted text-center py-3">Chargement des factures...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./gestion-paiements.js"></script>
</body>
</html>
