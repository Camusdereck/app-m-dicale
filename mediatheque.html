<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Médiathèque & Conseils Santé - MediConnect CI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-mediatheque {
            background: linear-gradient(135deg, #1D375A 0%, #29A7E5 100%);
            padding: 120px 0 60px 0;
            color: white;
            text-align: center;
        }
        .article-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .article-img-container {
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        .article-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
        }
        .play-icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container-fluid px-4 px-lg-5 mt-2 mb-2">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-icon me-2"><i class="fas fa-stethoscope"></i></div>
                <span class="text-dark fw-bold">MediConnect CI</span>
            </a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav menu" id="dynamic-nav-menu"></ul>
                <div class="btn-nav ms-auto gap-2 d-flex" id="dynamic-nav-buttons"></div>
            </div>
        </div>
    </nav>

    <header class="hero-mediatheque">
        <div class="container">
            <h1 class="display-5 fw-bold mb-3"><i class="fas fa-book-medical me-3"></i>Médiathèque Santé</h1>
            <p class="lead mb-0">Découvrez nos articles, conseils et vidéos de prévention par nos experts.</p>
        </div>
    </header>

    <div class="container mt-5">
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5" id="categories-filter">
            <button class="btn btn-primary rounded-pill px-4 active" onclick="filtrerArticles('Tous')">Tous</button>
            <button class="btn btn-outline-primary rounded-pill px-4" onclick="filtrerArticles('Prévention')">Prévention</button>
            <button class="btn btn-outline-primary rounded-pill px-4" onclick="filtrerArticles('Nutrition')">Nutrition</button>
            <button class="btn btn-outline-primary rounded-pill px-4" onclick="filtrerArticles('Vidéo')"><i class="fas fa-play me-2"></i>Vidéos</button>
        </div>

        <div class="row g-4 mb-5" id="articles-grid">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Chargement...</span>
                </div>
                <p class="text-muted mt-3">Chargement des articles...</p>
            </div>
        </div>
    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./navbar.js"></script>
    <script src="./mediatheque.js"></script>
</body>
</html>
