<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie - MediConnect CI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container { height: calc(100vh - 150px); min-height: 500px; }
        .contacts-list { height: 100%; overflow-y: auto; border-right: 1px solid #dee2e6; }
        .contact-item { cursor: pointer; transition: background-color 0.2s; }
        .contact-item:hover, .contact-item.active { background-color: #f8f9fa; border-left: 4px solid #0d6efd; }
        .chat-box { height: calc(100% - 130px); overflow-y: auto; background-color: #f0f2f5; padding: 20px; }
        .message { max-width: 75%; border-radius: 15px; padding: 10px 15px; margin-bottom: 10px; }
        .message.sent { background-color: #dcf8c6; margin-left: auto; border-bottom-right-radius: 0; }
        .message.received { background-color: #ffffff; margin-right: auto; border-bottom-left-radius: 0; border: 1px solid #e9ecef; }
        .chat-input-area { background-color: #ffffff; border-top: 1px solid #dee2e6; padding: 15px; }
    </style>
</head>
<body class="bg-light">

    <div class="container-fluid mt-4 px-4">
        <div class="mb-3 d-flex justify-content-between align-items-center">
            <a href="javascript:history.back()" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-2"></i>Retour
            </a>
            <h3 class="text-primary-dark mb-0"><i class="fas fa-comments me-2"></i>Messagerie Sécurisée</h3>
        </div>
        
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden chat-container">
            <div class="row g-0 h-100">
                
                <div class="col-md-4 col-lg-3 contacts-list bg-white" id="contacts-container">
                    <div class="p-3 border-bottom bg-light">
                        <h6 class="mb-0 fw-bold">Mes Contacts</h6>
                    </div>
                    <div id="contacts-list">
                        <p class="text-muted text-center py-4">Chargement des contacts...</p>
                    </div>
                </div>

                <div class="col-md-8 col-lg-9 d-flex flex-column h-100 bg-white">
                    
                    <div class="p-3 border-bottom bg-light d-flex align-items-center">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;" id="chat-header-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <h5 class="mb-0" id="chat-header-name">Sélectionnez un contact</h5>
                    </div>

                    <div class="chat-box" id="chat-messages">
                        <div class="d-flex h-100 justify-content-center align-items-center">
                            <p class="text-muted text-center">Cliquez sur un contact à gauche pour démarrer la discussion.</p>
                        </div>
                    </div>

                    <div id="file-preview-container" class="bg-light px-4 py-2 border-top d-none d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center text-primary">
                            <i class="fas fa-file-alt me-2 fs-5"></i>
                            <span id="file-preview-name" class="fw-bold small text-truncate" style="max-width: 200px;">nom_du_fichier.jpg</span>
                        </div>
                        <button type="button" class="btn-close" id="remove-file-btn" aria-label="Close"></button>
                    </div>

                    <div class="chat-input-area">
                        <form id="messageForm" class="d-flex gap-2 align-items-center">
                            
                            <input type="file" id="file-input" class="d-none" accept="image/*,.pdf,.doc,.docx">
                            <button type="button" class="btn btn-light rounded-circle text-secondary shadow-sm" id="attach-btn" disabled style="width: 45px; height: 45px;">
                                <i class="fas fa-paperclip fs-5"></i>
                            </button>

                            <input type="text" class="form-control rounded-pill px-4 py-2" id="message-input" placeholder="Écrivez votre message..." disabled>
                            
                            <button type="submit" class="btn btn-primary rounded-circle shadow-sm" id="send-btn" disabled style="width: 45px; height: 45px;">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./messagerie.js"></script>
</body>
</html>
