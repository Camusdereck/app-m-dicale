<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléconsultation - MedecineEnLigne
</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container-fluid px-4 px-lg-5 mt-2 mb-2">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-icon me-2"><i class="fas fa-stethoscope"></i></div>
                <span class="text-dark fw-bold">MedecineEnLigne
</span>
            </a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav menu" id="dynamic-nav-menu"></ul>
                <div class="btn-nav ms-auto gap-2 d-flex" id="dynamic-nav-buttons"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px; margin-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                
                <div class="mb-4">
                    <a href="dashboard.html" class="text-decoration-none text-muted fw-bold">
                        <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
                    </a>
                </div>

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        
                        <div id="step-1">
                            <h3 class="text-primary-dark mb-4 fw-bold border-bottom pb-3"><i class="fas fa-video me-2"></i>1. Téléconsultation (Vidéo)</h3>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Sélectionnez la spécialité médicale</label>
                                <select class="form-select form-select-lg" id="specialite-select">
                                    <option selected disabled value="">Chargement des spécialités...</option>
                                </select>
                            </div>

                            <div id="doctors-grid" class="row g-3 mt-4" style="display: none;"></div>
                        </div>

                        <div id="step-2" style="display: none;">
                            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                                <h3 class="fw-bold text-primary-dark mb-0"><i class="fas fa-calendar-check me-2"></i>2. Votre Rendez-vous Vidéo</h3>
                                <button class="btn btn-outline-secondary btn-sm" onclick="retourEtape1()"><i class="fas fa-arrow-left me-1"></i>Changer</button>
                            </div>
                            
                            <div class="alert alert-info d-flex align-items-center mb-4 border-0">
                                <i class="fas fa-user-md fs-4 me-3 text-primary-dark"></i>
                                <div>Vous prenez rendez-vous avec le <strong id="medecin-choisi-nom" class="text-primary-dark">...</strong></div>
                            </div>

                            <form id="newAppointmentForm">
                                <input type="hidden" id="doctor-id-hidden">

                                <div class="mb-4">
                                    <label for="date-input" class="form-label fw-bold">Choisissez une date</label>
                                    <input type="date" class="form-control form-control-lg shadow-sm" id="date-input" required>
                                </div>
                                
                                <div class="mb-4" id="time-container" style="display: none;">
                                    <label class="form-label fw-bold">Choisissez un créneau horaire libre</label>
                                    <div id="slots-container" class="d-flex flex-wrap gap-2 mt-2">
                                        <p class="text-muted small">Veuillez sélectionner une date pour voir les disponibilités.</p>
                                    </div>
                                    <input type="hidden" id="selected-time" required>
                                </div>

                                <div class="mb-4" id="motif-container" style="display: none;">
                                    <label for="motif-input" class="form-label fw-bold">Motif de la consultation</label>
                                    <textarea class="form-control shadow-sm" id="motif-input" rows="3" placeholder="Ex: Maux de tête persistants, renouvellement d'ordonnance..." required></textarea>
                                </div>

                                <div class="alert border border-primary bg-primary bg-opacity-10 mb-4 d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="mb-0 fw-bold text-dark">Tarif de la téléconsultation :</h6>
                                        <small class="text-muted">Frais de plateforme inclus</small>
                                    </div>
                                    <h4 class="mb-0 fw-bold text-primary" id="prix-total-display">-- FCFA</h4>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 py-3 mt-2 fw-bold shadow" id="submitBtn" disabled>
                                    <i class="fas fa-check-circle me-2"></i>Confirmer la demande
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./navbar.js"></script>
    <script src="./nouveau-rdv.js"></script>
</body>
</html>
