<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Paiements - MediConnect CI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.cinetpay.com/seamless/main.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-5 max-w-700" style="max-width: 800px; margin: auto;">
        <div class="mb-4">
            <a href="./dashboard.html" class="text-decoration-none text-muted fw-bold">
                <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
            </a>
        </div>
        
        <h2 class="text-primary-dark mb-4 fw-bold"><i class="fas fa-file-invoice-dollar me-2"></i>Gestion des Paiements</h2>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-4 border-start border-warning border-4">
            <h4 class="card-title text-warning-dark mb-4 fw-bold"><i class="fas fa-hourglass-half me-2"></i>À régler</h4>
            <div id="pending-invoices">
                <p class="text-muted text-center py-3"><i class="fas fa-spinner fa-spin me-2"></i>Chargement de vos factures...</p>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-5">
            <h4 class="card-title text-success mb-4 fw-bold"><i class="fas fa-check-circle me-2"></i>Historique des paiements</h4>
            <div id="paid-invoices">
                <p class="text-muted text-center py-3"><i class="fas fa-spinner fa-spin me-2"></i>Chargement de l'historique...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./paiements.js"></script>
</body>
</html>
