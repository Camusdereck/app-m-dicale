<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier - MediConnect CI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container-fluid px-4 px-lg-5 mt-2 mb-2">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-icon me-2"><i class="fas fa-stethoscope"></i></div>
                <span class="text-dark fw-bold">MediConnect CI</span>
            </a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav menu" id="dynamic-nav-menu"></ul>
                <div class="btn-nav ms-auto gap-2 d-flex" id="dynamic-nav-buttons"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px; margin-bottom: 60px;">
        <h2 class="fw-bold mb-4">Mon Panier</h2>

        <div class="row g-4">
            <div class="col-lg-8" id="cart-items-container">
                </div>

            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 120px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Résumé de la commande</h5>
                        
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Sous-total</span>
                            <span id="sous-total">0 FCFA</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Frais de livraison</span>
                            <span>Calculés à l'étape suivante</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Total</span>
                            <span class="fw-bold fs-5 text-primary-dark" id="total-price">0 FCFA</span>
                        </div>

                        <button id="checkout-btn" class="btn btn-primary w-100 py-3 fw-bold btn-perso1">
                            <i class="fas fa-lock me-2"></i>Passer à la caisse
                        </button>
                        
                        <div class="text-center mt-3">
                            <img src="https://logodownload.org/wp-content/uploads/2019/09/visa-logo-1.png" alt="Visa" height="20" class="me-2">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Orange_Money_logo.svg/1024px-Orange_Money_logo.svg.png" alt="Orange Money" height="20" class="me-2">
                            <img src="https://wave.com/wp-content/uploads/2021/05/Wave-logo-black.png" alt="Wave" height="20">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="navbar.js"></script>
    <script src="panier.js"></script>
</body>
</html>
