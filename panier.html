<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier - MedecineEnLigne
</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg fixed-top bg-white shadow-sm">
        <div class="container-fluid px-4 px-lg-5 mt-2 mb-2">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-icon me-2"><i class="fas fa-stethoscope"></i></div>
                <span class="text-dark fw-bold">MedecineEnLigne
</span>
            </a>
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav menu" id="dynamic-nav-menu"></ul>
                <div class="btn-nav ms-auto gap-2 d-flex" id="dynamic-nav-buttons"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px; margin-bottom: 60px;">
        <h2 class="fw-bold mb-4">Mon Panier</h2>

        <div class="row g-4">
            <div class="col-lg-8" id="cart-items-container">
                </div>

            <div class="col-lg-4">
                <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 120px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Résumé de la commande</h5>
                        
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Sous-total</span>
                            <span id="sous-total">0 FCFA</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-muted">
                            <span>Frais de livraison</span>
                            <span>Calculés à l'étape suivante</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5">Total</span>
                            <span class="fw-bold fs-5 text-primary-dark" id="total-price">0 FCFA</span>
                        </div>

                        <button id="pay-online-btn" class="btn btn-success w-100 py-3 fw-bold mb-3 shadow-sm" disabled>
                            <i class="fas fa-credit-card me-2"></i>Payer en ligne (Wave, OM, MTN)
                        </button>
                        
                        <button id="pay-whatsapp-btn" class="btn btn-outline-success w-100 py-3 fw-bold mb-3" disabled>
                            <i class="fab fa-whatsapp fs-5 me-2"></i>Payer à la livraison (WhatsApp)
                        </button>
                        
                        <div class="d-flex justify-content-center align-items-center gap-2 mt-4 flex-wrap">
    
    <div class="d-flex align-items-center bg-white border px-2 py-1 rounded shadow-sm">
        <i class="fab fa-cc-visa fs-4 me-1" style="color: #1434CB;" title="Visa"></i>
        <i class="fab fa-cc-mastercard fs-4" style="color: #EB001B;" title="Mastercard"></i>
    </div>

    <div class="d-flex align-items-center bg-white border px-2 py-1 rounded shadow-sm" style="border-color: #FF7900 !important;">
        <svg viewBox="0 0 100 100" height="20" width="20" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="20" fill="#FF7900"/>
        </svg>
        <span class="ms-1 fw-bold" style="color: #000; font-size: 0.8rem;">Orange Money</span>
    </div>

    <div class="d-flex align-items-center bg-white border px-2 py-1 rounded shadow-sm" style="border-color: #1CC5FA !important;">
        <svg viewBox="0 0 100 100" height="20" width="20" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="20" fill="#1CC5FA"/>
            <path d="M 15 50 Q 32.5 20 50 50 T 85 50" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
        </svg>
        <span class="ms-1 fw-bold" style="color: #1CC5FA; font-size: 0.8rem;">Wave</span>
    </div>

    <div class="d-flex align-items-center bg-white border px-2 py-1 rounded shadow-sm" style="border-color: #FFCC00 !important;">
        <svg viewBox="0 0 100 100" height="20" width="20" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="50" fill="#FFCC00"/>
            <circle cx="50" cy="50" r="35" fill="#000000"/>
            <circle cx="50" cy="50" r="15" fill="#FFCC00"/>
        </svg>
        <span class="ms-1 fw-bold" style="color: #000; font-size: 0.8rem;">MTN</span>
    </div>

</div>
                    </div>
                </div>
            </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="navbar.js"></script>
    <script src="panier.js"></script>
</body>
</html>
