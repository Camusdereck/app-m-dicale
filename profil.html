<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - MediConnect CI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5 max-w-700">
        <div class="mb-4">
            <a href="javascript:history.back()" class="text-decoration-none text-muted">
                <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-4">
            <div class="text-center mb-4">
                <div class="position-relative d-inline-block mb-3">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 100px; height: 100px; font-size: 2.5rem; overflow: hidden;" id="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <label for="avatar-upload" class="position-absolute bottom-0 end-0 bg-white rounded-circle p-2 shadow-sm border" style="cursor: pointer; right: -5px; bottom: -5px;">
                        <i class="fas fa-camera text-primary"></i>
                    </label>
                    <input type="file" id="avatar-upload" class="d-none" accept="image/*">
                </div>
                <div>
                    <h3 class="text-primary-dark mb-1" id="profile-title">Mon Profil</h3>
                    <span class="badge bg-secondary" id="role-badge">Chargement...</span>
                </div>
            </div>

            <form id="profileForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="prenom-input" class="form-label fw-bold">Prénom</label>
                        <input type="text" class="form-control" id="prenom-input" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="nom-input" class="form-label fw-bold">Nom de famille</label>
                        <input type="text" class="form-control" id="nom-input" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email-input" class="form-label fw-bold">Adresse Email (Non modifiable)</label>
                    <input type="email" class="form-control bg-light" id="email-input" disabled>
                </div>

                <div class="mb-4">
                    <label for="telephone-input" class="form-label fw-bold">Numéro de téléphone</label>
                    <input type="tel" class="form-control" id="telephone-input" placeholder="Ex: 0102030405">
                </div>

                <div id="doctor-fields" style="display: none;" class="mb-4 p-3 bg-light rounded border">
                    <h6 class="text-primary mb-3"><i class="fas fa-user-md me-2"></i>Informations Professionnelles</h6>
                    <label for="specialite-input" class="form-label fw-bold small">Spécialité</label>
                    <input type="text" class="form-control" id="specialite-input" placeholder="Ex: Généraliste, Pédiatre...">
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="saveProfileBtn">
                    <i class="fas fa-save me-2"></i>Enregistrer les modifications
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./profil.js"></script>
</body>
</html>
