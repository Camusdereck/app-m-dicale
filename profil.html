<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - MediConnect CI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .max-w-700 { max-width: 700px; margin: auto; }
        #profile-avatar { transition: all 0.3s ease; border: 3px solid #fff; }
        .form-label { font-size: 0.9rem; color: #4a5568; }
        .section-medecin { display: none; } /* Caché par défaut, activé par le JS */
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5 max-w-700">
        <div class="mb-4">
            <a href="#" id="back-to-dashboard" class="text-decoration-none text-muted">
               <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
            </a>
        </div>

        <div class="card shadow-sm border-0 rounded-4 p-4 mb-5">
            <div class="text-center mb-4">
                <div class="position-relative d-inline-block mb-3">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 110px; height: 110px; font-size: 2.5rem; overflow: hidden;" id="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <label for="avatar-upload" class="position-absolute bottom-0 end-0 bg-white rounded-circle p-2 shadow-sm border" style="cursor: pointer; right: -5px; bottom: -5px;">
                        <i class="fas fa-camera text-primary"></i>
                    </label>
                    <input type="file" id="avatar-upload" class="d-none" accept="image/*">
                </div>
                <div>
                    <h3 class="text-primary-dark fw-bold mb-1" id="profile-title">Paramètres du profil</h3>
                    <span class="badge bg-secondary px-3 py-2 rounded-pill" id="role-badge">Chargement...</span>
                </div>
            </div>

            <form id="profileForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="prenom-input" class="form-label fw-bold">Prénom</label>
                        <input type="text" class="form-control rounded-3" id="prenom-input" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="nom-input" class="form-label fw-bold">Nom de famille</label>
                        <input type="text" class="form-control rounded-3" id="nom-input" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email-input" class="form-label fw-bold">Adresse Email (Identifiant)</label>
                    <input type="email" class="form-control bg-light rounded-3" id="email-input" disabled>
                </div>

                <div class="mb-4">
                    <label for="telephone-input" class="form-label fw-bold">Numéro de téléphone</label>
                    <input type="tel" class="form-control rounded-3" id="telephone-input" placeholder="Ex: 0707070707">
                </div>

                <div class="section-medecin" id="doctor-only-fields">
                    
                    <div id="doctor-fields" class="mb-4 p-3 bg-light rounded-3 border">
                        <h6 class="text-primary fw-bold mb-3"><i class="fas fa-user-md me-2"></i>Expertise</h6>
                        <label for="specialite-input" class="form-label fw-bold small">Votre spécialité médicale</label>
                        <input type="text" class="form-control" id="specialite-input" placeholder="Ex: Cardiologue, Généraliste...">
                    </div>

                    <div id="doctor-pricing-fields" class="mb-4 p-3 bg-warning bg-opacity-10 border border-warning rounded-3">
                        <h6 class="text-warning-dark fw-bold mb-3"><i class="fas fa-tags me-2"></i>Mes Tarifs de Consultation</h6>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Téléconsultation (Vidéo)</label>
                                <div class="input-group">
                                    <input type="number" id="tarif-video" class="form-control" placeholder="5000">
                                    <span class="input-group-text">FCFA</span>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Visite à Domicile</label>
                                <div class="input-group">
                                    <input type="number" id="tarif-domicile" class="form-control" placeholder="15000">
                                    <span class="input-group-text">FCFA</span>
                                </div>
                            </div>
                        </div>
                        <p class="text-muted mb-0" style="font-size: 0.75rem;"><i class="fas fa-info-circle me-1"></i>MediConnect prélève 20% de commission sur ces tarifs.</p>
                    </div>

                    <div id="doctor-payment-fields" class="mb-4 p-3 bg-success bg-opacity-10 border border-success rounded-3">
                        <h6 class="text-success fw-bold mb-3"><i class="fas fa-wallet me-2"></i>Réception des Paiements</h6>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Moyen de paiement</label>
                                <select id="moyen-paiement" class="form-select">
                                    <option value="Wave">Wave</option>
                                    <option value="Orange Money">Orange Money</option>
                                    <option value="MTN">MTN Money</option>
                                    <option value="RIB">Virement Bancaire (RIB)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Numéro ou RIB</label>
                                <input type="text" id="coordonnees-paiement" class="form-control" placeholder="Ex: 0102030405">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm" id="saveProfileBtn">
                    <i class="fas fa-save me-2"></i>Enregistrer les modifications
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./profil.js"></script>
</body>
</html>
