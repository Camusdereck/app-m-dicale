<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification - MedecineEnLigne</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Style spécifique pour le champ du code à 6 chiffres */
        .otp-input {
            letter-spacing: 0.5rem;
            font-size: 2rem;
            text-align: center;
            font-weight: bold;
            max-width: 300px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-100 py-4">
                <div class="col-md-8 col-lg-5">
                    
                    <div class="text-center mb-4">
                        <div class="d-flex align-items-center justify-content-center mb-3">
                            <div class="logo-icon me-2">
                                <i class="fas fa-stethoscope text-white"></i>
                            </div>
                            <span class="h3 fw-bold text-primary-dark mb-0">MedecineEnLigne</span>
                        </div>
                    </div>

                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-body p-5 text-center">
                            <div class="mb-4">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                                    <i class="fas fa-envelope-open-text fa-3x"></i>
                                </div>
                                <h3 class="fw-bold text-dark">Vérifiez votre email</h3>
                                <p class="text-muted mt-2">
                                    Nous avons envoyé un code de confirmation à <br>
                                    <strong id="display-email" class="text-primary-dark">...</strong>
                                </p>
                            </div>

                            <form id="verificationForm">
                                <div class="mb-4">
                                    <label for="otpCode" class="form-label text-muted small text-uppercase fw-bold">Code à 8 chiffres</label>
                                    <input type="text" class="form-control form-control-lg otp-input" id="otpCode" maxlength="8" placeholder="00000000" autocomplete="one-time-code" required>
                                    <div class="invalid-feedback">Veuillez entrer le code à 8 chiffres.</div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill" id="verify-btn">
                                    Confirmer mon compte <i class="fas fa-arrow-right ms-2"></i>
                                </button>
                            </form>

                            <div class="mt-4">
                                <p class="text-muted small">
                                    Vous n'avez rien reçu ? <br>
                                    Vérifiez vos spams ou <a href="registre.html" class="text-primary text-decoration-none fw-bold">recommencez l'inscription</a>.
                                </p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./verification.js"></script>
</body>
</html>
